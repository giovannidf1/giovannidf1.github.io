<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sphereGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff8e8e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff4757;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bridgeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#764ba2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f093fb;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" fill="#0f0f23"/>
  
  <!-- Bridge -->
  <rect x="0" y="120" width="200" height="20" fill="url(#bridgeGradient)" opacity="0.8"/>
  <rect x="0" y="130" width="200" height="10" fill="#1a1a3e"/>
  
  <!-- Bridge rails -->
  <rect x="0" y="115" width="200" height="3" fill="#667eea"/>
  <rect x="0" y="137" width="200" height="3" fill="#667eea"/>
  
  <!-- Main sphere -->
  <circle cx="100" cy="100" r="25" fill="url(#sphereGradient)" filter="url(#glow)"/>
  
  <!-- Sphere highlight -->
  <ellipse cx="90" cy="85" rx="8" ry="12" fill="url(#glowGradient)" opacity="0.6"/>
  
  <!-- Speed lines -->
  <line x1="50" y1="100" x2="70" y2="100" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
  <line x1="45" y1="95" x2="65" y2="95" stroke="#ffffff" stroke-width="2" opacity="0.4"/>
  <line x1="40" y1="105" x2="60" y2="105" stroke="#ffffff" stroke-width="2" opacity="0.4"/>
  
  <!-- Obstacles -->
  <rect x="150" y="110" width="15" height="20" fill="#ff4757" opacity="0.8"/>
  <rect x="170" y="115" width="15" height="15" fill="#ffa502" opacity="0.8"/>
  
  <!-- Power-ups -->
  <circle cx="30" cy="100" r="8" fill="#4ecdc4" opacity="0.9"/>
  <polygon points="30,92 34,100 30,108 26,100" fill="#ffffff" opacity="0.8"/>
  
  <!-- Particles -->
  <circle cx="20" cy="80" r="2" fill="#ffffff" opacity="0.6"/>
  <circle cx="180" cy="70" r="2" fill="#ffffff" opacity="0.6"/>
  <circle cx="40" cy="60" r="2" fill="#ffffff" opacity="0.6"/>
  <circle cx="160" cy="90" r="2" fill="#ffffff" opacity="0.6"/>
</svg>
