<svg width="400" height="600" viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bridgeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2c3e50;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#34495e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c3e50;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sphereGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff8e8e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff4757;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background sky -->
  <rect width="400" height="600" fill="url(#skyGradient)"/>
  
  <!-- Bridge platform -->
  <rect x="0" y="450" width="400" height="150" fill="url(#bridgeGradient)"/>
  
  <!-- Bridge rails -->
  <rect x="0" y="440" width="400" height="5" fill="#667eea"/>
  <rect x="0" y="590" width="400" height="5" fill="#667eea"/>
  
  <!-- Main sphere -->
  <circle cx="200" cy="400" r="20" fill="url(#sphereGradient)" filter="url(#glow)"/>
  <ellipse cx="190" cy="390" rx="6" ry="8" fill="url(#glowGradient)" opacity="0.6"/>
  
  <!-- Obstacles -->
  <rect x="100" y="420" width="20" height="30" fill="#ff4757" opacity="0.9"/>
  <rect x="150" y="430" width="25" height="20" fill="#ffa502" opacity="0.9"/>
  <rect x="250" y="425" width="15" height="25" fill="#ff4757" opacity="0.9"/>
  <rect x="300" y="435" width="20" height="15" fill="#ffa502" opacity="0.9"/>
  
  <!-- Power-ups -->
  <circle cx="80" cy="400" r="10" fill="#4ecdc4" opacity="0.9"/>
  <polygon points="80,390 85,400 80,410 75,400" fill="#ffffff" opacity="0.8"/>
  
  <circle cx="320" cy="400" r="10" fill="#ff6b6b" opacity="0.9"/>
  <circle cx="320" cy="400" r="6" fill="#ffffff" opacity="0.8"/>
  
  <!-- Speed lines -->
  <line x1="50" y1="400" x2="70" y2="400" stroke="#ffffff" stroke-width="3" opacity="0.7"/>
  <line x1="45" y1="390" x2="65" y2="390" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
  <line x1="40" y1="410" x2="60" y2="410" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
  
  <!-- UI Elements -->
  <rect x="20" y="20" width="100" height="40" fill="rgba(0,0,0,0.7)" rx="20"/>
  <text x="70" y="45" text-anchor="middle" fill="white" font-family="Arial" font-size="16" font-weight="bold">SCORE: 1250</text>
  
  <rect x="280" y="20" width="100" height="40" fill="rgba(0,0,0,0.7)" rx="20"/>
  <text x="330" y="45" text-anchor="middle" fill="white" font-family="Arial" font-size="16" font-weight="bold">LIVES: 3</text>
  
  <!-- Particles and effects -->
  <circle cx="60" cy="200" r="3" fill="#ffffff" opacity="0.6"/>
  <circle cx="340" cy="150" r="3" fill="#ffffff" opacity="0.6"/>
  <circle cx="120" cy="100" r="3" fill="#ffffff" opacity="0.6"/>
  <circle cx="280" cy="250" r="3" fill="#ffffff" opacity="0.6"/>
  <circle cx="50" cy="300" r="3" fill="#ffffff" opacity="0.6"/>
  <circle cx="350" cy="350" r="3" fill="#ffffff" opacity="0.6"/>
</svg>
